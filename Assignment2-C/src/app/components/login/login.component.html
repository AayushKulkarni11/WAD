<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-icon">🎓</div>
      <h2>Welcome Back</h2>
      <p>Sign in to access your profile</p>
    </div>

    <div class="alert-error" *ngIf="loginError">
      {{ loginError }}
    </div>

    <form [formGroup]="loginForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" placeholder="Enter your name" formControlName="name" />
        </div>
        <span class="error-msg" *ngIf="loginForm.get('name')?.invalid && loginForm.get('name')?.touched">
          Name is required.
        </span>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" placeholder="Enter your email" formControlName="email" />
        </div>
        <span class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Enter a valid email.
        </span>
      </div>

      <button class="btn-primary-custom" type="button"
        (click)="loginSubmit()" [disabled]="loginForm.invalid">
        Sign In →
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a (click)="gotoSignup()">Register here</a>
    </div>

  </div>
</div>
