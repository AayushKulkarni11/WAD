<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="brand-icon">✨</div>
      <h2>Create Account</h2>
      <p>Register to get started</p>
    </div>

    <div class="alert-error" *ngIf="registerError">
      {{ registerError }}
    </div>

    <form [formGroup]="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" placeholder="Enter your full name" formControlName="name" />
        </div>
        <span class="error-msg" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Name is required.
        </span>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" placeholder="Enter your email" formControlName="email" />
        </div>
        <span class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Enter a valid email.
        </span>
      </div>

      <button class="btn-primary-custom" type="button"
        (click)="registerSubmit()" [disabled]="registerForm.invalid">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a (click)="gotoLogin()">Sign in here</a>
    </div>

  </div>
</div>
