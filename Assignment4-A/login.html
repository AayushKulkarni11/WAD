
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - jQuery Mobile</title>
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
    <style>
        .content-wrap { text-align: center; padding: 20px; }
        .form-container { max-width: 400px; margin: 0 auto; text-align: left; }
        .quicklinks { text-align: center; }
    </style>
</head>
<body>
    <div data-role="page">
        <div data-role="header" data-theme="b">
            <h1>Assignment 4-A jQuery Mobile</h1>
        </div>

        <div data-role="navbar" data-grid="b">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="departments.html">Departments</a></li>
                <li><a href="login_register.html" class="ui-btn-active">Login/Register</a></li>
            </ul>
        </div>

        <div role="main" class="ui-content content-wrap">
            <h2>Login</h2>
            <div class="form-container">
                <form action="#" method="post">
                    <div class="ui-field-contain">
                        <label for="email">Email-ID:</label>
                        <input type="email" name="email" id="email" placeholder="Enter your email">

                        <label for="password">Password:</label>
                        <input type="password" name="password" id="password" placeholder="Enter your password">

                        <input type="submit" value="Login" data-theme="b">
                    </div>
                </form>
            </div>
            <p><a href="login_register.html">Don't have an account? Register</a></p>
        </div>

        <script>
            $(document).on("pagecreate", function() {
                $("form").on("submit", function(e) {
                    e.preventDefault();
                    var email = $("#email").val();
                    if (email) {
                        alert("Login Successful! Welcome, " + email);
                    }
                });
            });
        </script>


        <div data-role="footer" data-theme="b" data-position="fixed">
            <div class="quicklinks">
                <h4>PESMODERNCOE &copy; 2026</h4>
            </div>
        </div>
    </div>
</body>
</html>
